<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="neon-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with subtle deep navy -->
  <rect width="64" height="64" rx="16" fill="#020617"/>
  
  <!-- Outer Ring (Disc edge) -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#neon-blue)" stroke-width="2.5" opacity="0.4" />
  
  <!-- Main Disc shape -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="url(#neon-blue)" stroke-width="4.5" filter="url(#glow)"/>
  
  <!-- Center Hole -->
  <circle cx="32" cy="32" r="6" fill="#020617" stroke="url(#neon-blue)" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="2.5" fill="#0ea5e9" opacity="0.8"/>

  <!-- Stylish Accents (Neon lines representing tracks/laser) -->
  <path d="M32 11 A 21 21 0 0 1 53 32" fill="none" stroke="#f8fafc" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <path d="M11 32 A 21 21 0 0 0 32 53" fill="none" stroke="#f8fafc" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />

  <!-- D M Initial (Compact and Stylized) -->
  <text x="32" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="900" fill="#ffffff" letter-spacing="1">DM</text>
</svg>
